<!doctype html>
<html>
  <head>
    <style>
      body {
        font-family: Arial, sans-serif;
        line-height: 1.6;
        color: #333;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        border: 1px solid #ddd;
        border-radius: 10px;
      }
      .header {
        background-color: #ff9800;
        color: white;
        padding: 10px;
        text-align: center;
        border-radius: 5px;
      }
      .content {
        padding: 20px;
      }
      .button {
        display: inline-block;
        padding: 10px 20px;
        background-color: #ff9800;
        color: white;
        text-decoration: none;
        border-radius: 5px;
      }
      .footer {
        text-align: center;
        padding: 10px;
        font-size: 12px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2>We miss you, {{ first_name }}! 🧡</h2>
      </div>
      <div class="content">
        <p>
          It's been <strong>{{ days_inactive }} days</strong> since your last
          visit.
        </p>
        <p>We've added new features and improvements we think you'll love!</p>
        <p>
          <a href="http://localhost:8000/docs" class="button">Log in Now</a>
        </p>
        <p>See you soon!</p>
        <p>The FastAPI Team</p>
      </div>
      <div class="footer">
        <p>This is an automated message. Please do not reply.</p>
      </div>
    </div>
  </body>
</html>
